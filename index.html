<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso App de Casal 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="custom-toast-container">
        <div id="custom-toast"></div>
    </div>

    <div id="anniversary-banner" style="display:none; text-align:center; background: var(--accent-pink); color:white; padding:12px; font-weight:bold;">
        🎉 Parabéns pelo nosso dia! ❤️
    </div>

    <div class="header">
        <div id="counter">0d 0h 0m 0s</div>
        <div id="moedas-count-wrapper">🪙 Moedas do Casal: <span id="moedas-count">0</span></div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="mudarTela('tela-mural', this)">📸 Mural</button>
        <button class="nav-btn" onclick="mudarTela('tela-missoes', this)">🎯 Missões</button>
        <button class="nav-btn" onclick="mudarTela('tela-loja', this)">🍿 Loja</button>
        <button class="nav-btn" onclick="mudarTela('tela-encontros', this)">🌹 Encontros</button>
        <button class="nav-btn" onclick="mudarTela('tela-roleta', this)">🎲 Jogos</button>
    </nav>

    <div id="tela-mural" class="app-screen active">
        <button class="action-btn btn-full" onclick="abrirModalGerenciarMural()" style="margin-bottom:20px;">
            ➕ Anexar Nova Lembrança
        </button>
        <div id="mural-container"></div>
    </div>

    <div id="modal-mural" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:var(--bg-card); padding:25px; border-radius:12px; width:90%; max-width:400px; border:1px solid var(--border-color);">
            <h4 style="margin-bottom:15px; font-size:1.2rem;">Nova Lembrança</h4>
            <div class="form-group">
                <label>Selecione a Foto ou Vídeo:</label>
                <input type="file" id="mural-file" accept="image/*,video/*">
            </div>
            <div class="form-group">
                <label>Legenda:</label>
                <input type="text" id="mural-legenda" placeholder="Escreva algo sobre este momento...">
            </div>
            <button class="action-btn btn-full" onclick="salvarMidiaMural()">💾 Salvar na Nuvem</button>
            <button class="action-btn btn-full" onclick="fecharModalMural()" style="background:#475569; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <div id="tela-missoes" class="app-screen">
        <h3 style="margin-bottom:20px; text-align:center;">🎯 Missões Cumpridas</h3>
        <div id="lista-missoes"></div>
    </div>

    <div id="tela-loja" class="app-screen">
        <h3 style="margin-bottom:20px; text-align:center;">🍿 Resgatar Mimos</h3>
        <div id="lista-loja" class="shop-grid"></div>
    </div>

    <div id="modal-cupom" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index:2000;">
        <div style="background:#111; padding:25px; border-radius:12px; text-align:center; max-width:90%; border:1px solid var(--border-color);">
            <div id="wrapper-imagem-cupom"></div>
            <a id="btn-baixar-cupom" class="action-btn" style="display:inline-block; margin-top:15px; text-decoration:none;">📥 Baixar Imagem do Cupom</a>
            <button onclick="fecharModal()" style="display:block; margin:15px auto 0; background:transparent; color:var(--text-muted); border:none; cursor:pointer; text-decoration:underline;">Fechar Janela</button>
        </div>
    </div>

    <div id="tela-encontros" class="app-screen">
        <h3 style="margin-bottom:20px; text-align:center;">🌹 Agendar Date</h3>
        <div style="max-width:400px; margin:0 auto; display:flex; flex-direction:column; gap:12px;">
            <input type="date" id="date-input">
            <input type="time" id="time-input">
            <input type="text" id="place-input" placeholder="Onde vamos?">
            <input type="text" id="notes-input" placeholder="Notas do Date (Ex: Levar casaco)">
            <input type="tel" id="phone-input" placeholder="WhatsApp do amor (Ex: 85999999999)">
            <button class="action-btn" onclick="agendarEncontro()">Enviar Proposta via WhatsApp 🚀</button>
        </div>
        <hr style="margin:25px 0; border:none; border-top:1px solid var(--border-color);">
        <div id="convite-encontro-container"></div>
    </div>

    <div id="tela-roleta" class="app-screen">
        <h3 style="margin-bottom:20px; text-align:center;">🎲 O que fazer hoje?</h3>
        <div style="text-align:center; padding:30px 10px;">
            <div id="roulette-display" style="font-size:1.3rem; font-weight:bold; background:var(--bg-card); color:white; padding:25px; border-radius:12px; min-height:80px; display:flex; align-items:center; justify-content:center; border:1px solid var(--border-color); margin-bottom:25px;">✨ Girar a sorte ✨</div>
            <button class="action-btn" onclick="rodarRoleta()" style="padding:15px 40px; font-size:1.1rem; border-radius:50px;">Sortear Atividade 🎰</button>
            <button onclick="abrirSurpresa()" style="display:block; margin:35px auto 0; background:none; border:none; color:var(--accent-pink); cursor:pointer; text-decoration:underline;">💖 Mensagem Romântica Surpresa</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
